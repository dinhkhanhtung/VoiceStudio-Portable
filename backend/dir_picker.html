<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Voice Studio - Chọn thư mục lưu dữ liệu</title>
  <style>
    :root {
      --bg-color: #0F172A;
      --card-bg: rgba(30, 41, 59, 0.5);
      --text-color: #F8FAFC;
      --text-muted: #94A3B8;
      --primary: #6366F1;
      --primary-glow: rgba(99, 102, 241, 0.4);
      --border-color: rgba(255, 255, 255, 0.08);
      --success: #10B981;
    }

    body {
      margin: 0;
      padding: 30px 40px;
      height: 100vh;
      box-sizing: border-box;
      background-color: var(--bg-color);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-color);
      user-select: none;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .logo-glow {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: block;
    }

    h2 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 6px 0;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .path-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .path-display {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 12px;
      color: #38bdf8;
      word-break: break-all;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .path-icon {
      font-size: 16px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: auto;
    }

    button {
      flex: 1;
      padding: 12px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-browse {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-color);
      border: 1px solid var(--border-color);
    }

    .btn-browse:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-default {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .btn-default:hover {
      background: #4F46E5;
      transform: translateY(-1px);
    }
    
    .btn-default:active {
      transform: translateY(0);
    }

    .error-msg {
      color: #f87171;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-glow">
      <img class="logo-icon" src="../frontend/dist/android-chrome-512x512.png" alt="Voice Studio">
    </div>
    <div>
      <h2>Thiết lập thư mục lưu dữ liệu</h2>
      <div class="subtitle">Ứng dụng cần tải ~7GB môi trường AI (Python, model).<br>Bạn có thể chọn ổ đĩa khác nếu ổ C: sắp đầy.</div>
    </div>
  </div>

  <div class="card">
    <div class="path-label">Thư mục hiện tại</div>
    <div class="path-display">
      <span class="path-icon">📂</span>
      <span id="pathText">Đang tải...</span>
    </div>
    <div class="error-msg" id="errorMsg">Không thể sử dụng thư mục này. Vui lòng chọn lại.</div>
  </div>

  <div class="actions">
    <button class="btn-browse" id="browseBtn">
      <span>🔍</span> Chọn ổ đĩa khác...
    </button>
    <button class="btn-default" id="defaultBtn">
      <span>✨</span> Xác nhận & Tiếp tục
    </button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    let chosenDir = null;

    const pathText = document.getElementById('pathText');
    const browseBtn = document.getElementById('browseBtn');
    const defaultBtn = document.getElementById('defaultBtn');
    const errorMsg = document.getElementById('errorMsg');

    ipcRenderer.on('init', (_e, { defaultDir }) => {
      pathText.textContent = defaultDir + ' (Mặc định)';
    });

    browseBtn.onclick = async () => {
      errorMsg.style.display = 'none';
      const result = await ipcRenderer.invoke('dirPicker:browse');
      if (result) {
        chosenDir = result;
        pathText.textContent = result;
        pathText.style.color = '#10B981'; // Success green
      }
    };

    defaultBtn.onclick = () => {
      // Disabled button to prevent double clicks
      defaultBtn.style.opacity = '0.7';
      defaultBtn.textContent = 'Đang xử lý...';
      ipcRenderer.send('dirPicker:done', chosenDir);
    };
  </script>
</body>
</html>
