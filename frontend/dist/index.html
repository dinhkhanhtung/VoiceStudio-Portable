
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Voice Studio</title>
      <meta name="description" content="Đọc văn bản, dịch và nhân bản giọng nói cá nhân." />
      <meta name="robots" content="noindex, nofollow" />
      <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
      <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
      <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
      <link rel="manifest" href="/site.webmanifest" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      
      <script type="module" crossorigin src="/app-assets/index-DOc6MRy9.js"></script>
      <link rel="stylesheet" crossorigin href="/app-assets/index-B26D5QHb.css">
      <link rel="stylesheet" crossorigin href="/app-assets/custom-theme.css">
      <script>
        // Hide the update section (since it's a portable app)
        setInterval(() => {
          const elements = Array.from(document.querySelectorAll('div, h2, h3'));
          for (const el of elements) {
            if (el.textContent === 'Cập nhật ứng dụng' || el.textContent === 'App update') {
              let parent = el.parentElement;
              while (parent && parent.tagName !== 'BODY') {
                const classStr = parent.className || '';
                // The card usually has these classes in Tailwind/shadcn
                if (classStr.includes('border') && classStr.includes('rounded')) {
                  parent.style.display = 'none';
                  break;
                }
                parent = parent.parentElement;
              }
            }
          }

          // Replace Donate button
          const donateBtns = Array.from(document.querySelectorAll('button, a')).filter(el => el.textContent.includes('Donate') || el.textContent.includes('Ủng hộ'));
          for (const btn of donateBtns) {
            if (!btn.dataset.modified) {
              btn.dataset.modified = 'true';
              btn.innerHTML = '🏦 BIDV: 0982581222';
              
              const clone = btn.cloneNode(true);
              btn.parentNode.replaceChild(clone, btn);
              
              clone.addEventListener('click', (e) => {
                e.preventDefault();
                alert('Thông tin Donate:\\nNgân hàng: BIDV\\nSố tài khoản: 0982581222\\nChủ tài khoản: Đinh Khánh Tùng\\n\\nXin chân thành cảm ơn sự ủng hộ của bạn!');
              });
            }
          }
        }, 500);
      </script>
    </head>

    <body>
      
      <div id="root"></div>
      
      <div style="position: fixed; bottom: 10px; right: 10px; font-size: 12px; color: var(--muted-foreground); z-index: 9999;">
        Tài trợ bởi <a href="https://kimke.store/" target="_blank" style="color: var(--primary); text-decoration: none;">kimke.store</a>
      </div>
    </body>
  </html>
